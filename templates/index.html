<script>
    // Sidebar Toggle Logic (Improved)
    document.addEventListener('click', function(e) {
        const toggleBtn = e.target.closest('#sidebar-toggle-btn');
        if (toggleBtn) {
            const doc = window.parent.document;
            const collapseBtn = doc.querySelector('div[data-testid="stSidebarCollapseButton"] button') || doc.querySelector('button[aria-label="Collapse sidebar"]');
            const expandBtn = doc.querySelector('button[data-testid="stExpandSidebarButton"]') || doc.querySelector('button[aria-label="Expand sidebar"]');
            
            // Priority 1: If expand button is visible, click it
            if (expandBtn && expandBtn.getBoundingClientRect().width > 0) {
                expandBtn.click();
            } 
            // Priority 2: If collapse button is visible, click it
            else if (collapseBtn && collapseBtn.getBoundingClientRect().width > 0) {
                collapseBtn.click();
            }
            // Fallback: Just try both if width detection fails
            else if (expandBtn) {
                expandBtn.click();
            } else if (collapseBtn) {
                collapseBtn.click();
            }
        }
    });

    // Auto-hide Native Streamlit Header on Map Page
    const observer = new MutationObserver((mutations) => {
        const doc = window.parent.document;
        if (doc.querySelector('.map-fullscreen-flag')) {
            const header = doc.querySelector('header[data-testid="stHeader"]');
            if (header) header.style.display = 'none';
        }
    });
    observer.observe(window.parent.document.body, { childList: true, subtree: true });
</script>
